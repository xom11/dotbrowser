# Unified config for `dotbrowser vivaldi apply`. One file, one apply
# cycle (kill-browser → backup → write).
#
# Table semantics (same as the Brave example):
#   - missing header  → module skipped, managed entries left alone.
#   - empty body      → all previously-managed entries reset / popped.
#
# Discover Vivaldi command names with:
#   dotbrowser vivaldi shortcuts list [filter]
#
# Discover preference key paths with:
#   dotbrowser vivaldi settings dump <some.key.path>
# (or by greping ~/Library/Application Support/Vivaldi/Default/Preferences)

[shortcuts]
# Vivaldi shortcut format is lowercase tokens joined by `+`. The `meta+`
# prefix means Cmd on macOS and Win/Super on Linux/Windows — Vivaldi
# uses the same spelling everywhere, so configs are portable across
# platforms (unlike Brave, which serializes Cmd as `Command+`).

# Tab management. The TAB_SWITCH_*_HISTORY pair walks tabs in MRU
# (most-recently-used) order, which is what most users mean by
# "next/previous tab". Use TAB_SWITCH_*_ORDER if you want left-to-right
# strip order instead.
COMMAND_NEW_TAB                    = ["meta+t"]
COMMAND_CLOSE_TAB                  = ["meta+w"]
COMMAND_TAB_REOPEN_RECENTLY_CLOSED = ["shift+meta+t"]
COMMAND_TAB_SWITCH_FORWARD_HISTORY = ["ctrl+tab"]
COMMAND_TAB_SWITCH_BACK_HISTORY    = ["ctrl+shift+tab"]

# Address bar / search / find-in-page
COMMAND_FOCUS_ADDRESSFIELD = ["meta+l"]
COMMAND_FOCUS_SEARCHFIELD  = ["meta+e", "meta+k"]
COMMAND_FIND_IN_PAGE       = ["meta+f"]

# History / downloads / bookmarks
COMMAND_ADD_BOOKMARK         = ["meta+d"]
COMMAND_SHOW_DOWNLOADS_PANEL = ["meta+j"]
COMMAND_SHOW_HISTORY         = ["meta+y"]

[settings]
# Each key is a dotted path into Vivaldi's `Preferences` JSON. Comments
# below name the Vivaldi UI option each key controls. Run
#   dotbrowser vivaldi settings dump <key>
# to see the current value of any key before adding it here.

# UI density / tabs.
"vivaldi.tabs.minimize"      = false  # Click active tab to minimize it
"vivaldi.status_bar.display" = 1      # 0=off / 1=on / 2=overlay
"vivaldi.status_bar.minimized" = 0    # 0=normal / 1=minimized status bar
"vivaldi.tabs.bar.position"  = 1      # 0=top / 1=bottom / 2=left / 3=right
"vivaldi.menu.compact"       = true   # Compact application menu

# Note: many other UI keys (e.g. address-bar URL hover, bookmarks-bar
# visibility) only materialize in `Preferences` after you've toggled
# the matching control once via the Vivaldi UI. Use
#   dotbrowser vivaldi settings dump <key>
# to confirm a key exists in your profile before adding it here.

# ---------------------------------------------------------------------------
# Keys dotbrowser will REFUSE (MAC-protected — Chromium tracked prefs).
# Set these via the Vivaldi UI manually; dotbrowser intentionally stays out
# of the MAC-rewriting business.
#
# Well-known offenders from Chromium's kTrackedPrefs[]:
#   homepage, homepage_is_newtabpage
#   session.startup_urls, session.restore_on_startup
#   browser.show_home_button
#   default_search_provider_data.template_url_data
#   pinned_tabs
#
# To check if a key is refused in YOUR profile, just put it in [settings]
# above and run `dotbrowser vivaldi apply <file> --dry-run`.

# ---------------------------------------------------------------------------
# [pwa] — declarative force-installed Progressive Web Apps via Chromium's
# `WebAppInstallForceList` policy. Same caveats as the Brave version:
#   - REQUIRES SUDO. Policy file is root-owned:
#       Linux: /etc/vivaldi/policies/managed/dotbrowser-pwa.json
#       macOS: /Library/Managed Preferences/com.vivaldi.Vivaldi.plist
#   - REQUIRES VIVALDI RESTART. Policies are read at startup only.
#   - Force-installed apps cannot be uninstalled via the Vivaldi UI.
#
# Uncomment + edit to force-install PWAs.
#
# [pwa]
# urls = [
#   "https://squoosh.app/",
# ]
