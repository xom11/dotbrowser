# Example config for `dotbrowser brave settings apply`.
#
# Keys are dotted paths into Brave's Preferences JSON. Any key that has
# a corresponding entry under `protection.macs.<key>` (a Chromium "tracked
# pref") is refused — writing it without updating its MAC would cause
# Brave to reset it on next launch. Common refused keys: `homepage`,
# `session.startup_urls`, `browser.show_home_button`,
# `default_search_provider_data.template_url_data`, `pinned_tabs`.
#
# Brave Sync may overwrite some of these on next sync pulse. If that
# bites you, disable Sync for the affected category.

[settings]
# Vertical tab strip (Brave-specific UI layout)
"brave.tabs.vertical_tabs_enabled" = true
"brave.tabs.vertical_tabs_collapsed" = false

# Bookmark bar: show tab-group chips
"bookmark_bar.show_tab_groups" = true
